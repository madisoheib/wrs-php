name: Release

# Push a tag like v0.1.0 to cross-compile all targets and attach binaries
# (+ .sha256 sidecars) to the GitHub Release. These are exactly the assets
# `php artisan resonance:install` downloads.
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools / cross linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
          fi

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package asset (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/resonance resonance-${{ matrix.target }}
          shasum -a 256 resonance-${{ matrix.target }} > resonance-${{ matrix.target }}.sha256
      - name: Package asset (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/resonance.exe resonance-${{ matrix.target }}.exe
          sha256sum resonance-${{ matrix.target }}.exe > resonance-${{ matrix.target }}.exe.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            resonance-${{ matrix.target }}*

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
